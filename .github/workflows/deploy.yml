name: 🚀 Deploy AI Agent to AWS VPS

on:
  push:
    branches:
      - main  # Trigger only on push to main branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🚀 Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          envs: TELEGRAM_BOT_TOKEN,TELEGRAM_CHAT_ID
          script: |
            cd ~/naisora-ai-agent
            git stash
            git pull origin main
            
            # Update .env file with secrets
            touch .env
            sed -i "/^TELEGRAM_BOT_TOKEN=/d" .env
            echo "TELEGRAM_BOT_TOKEN=$TELEGRAM_BOT_TOKEN" >> .env
            sed -i "/^TELEGRAM_CHAT_ID=/d" .env
            echo "TELEGRAM_CHAT_ID=$TELEGRAM_CHAT_ID" >> .env

            export NVM_DIR="$HOME/.nvm"
            source "$NVM_DIR/nvm.sh"
            
            npm install
            pm2 restart naisora-agent
            pm2 restart naisora-whatsapp
            pm2 save
            echo "✅ Deployment successful!"
