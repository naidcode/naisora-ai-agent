name: 🚀 Deploy AI Agent to AWS VPS

on:
  push:
    branches:
      - main  # Trigger only on push to main branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🚀 Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          envs: TELEGRAM_BOT_TOKEN,TELEGRAM_CHAT_ID
          script: |
            # Check if directory exists, if not, find it or error out
            if [ -d "/home/${{ secrets.VPS_USER }}/naisora-ai-agent" ]; then
              cd "/home/${{ secrets.VPS_USER }}/naisora-ai-agent"
            elif [ -d "/home/${{ secrets.VPS_USER }}/Naisora-AI-Agent" ]; then
              cd "/home/${{ secrets.VPS_USER }}/Naisora-AI-Agent"
            else
              echo "❌ Error: Project directory not found in home folder!"
              exit 1
            fi
            
            git pull origin main
            
            # Update .env file with secrets
            touch .env
            sed -i "/^TELEGRAM_BOT_TOKEN=/d" .env
            echo "TELEGRAM_BOT_TOKEN=$TELEGRAM_BOT_TOKEN" >> .env
            sed -i "/^TELEGRAM_CHAT_ID=/d" .env
            echo "TELEGRAM_CHAT_ID=$TELEGRAM_CHAT_ID" >> .env
            
            npm install --production
            pm2 restart all || pm2 start index.js --name "naisora-agent"
            echo "✅ Deployment successful!"
